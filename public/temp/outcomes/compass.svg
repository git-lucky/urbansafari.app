<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" aria-hidden="true">
  <defs>
    <radialGradient id="ringGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#F7DC6F"/>
      <stop offset="45%" stop-color="#EAB72D"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="100%" stop-color="#F3EBD4"/>
    </radialGradient>
    <radialGradient id="shineGrad" cx="40%" cy="25%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- outer ring -->
  <circle cx="12" cy="12" r="10.5" fill="url(#ringGrad)" stroke="#0F2419" stroke-width="1.2"/>
  <!-- inner face -->
  <circle cx="12" cy="12" r="7.5" fill="url(#faceGrad)" stroke="#0F2419" stroke-width="0.8"/>
  <!-- N needle (red) -->
  <polygon points="12,5.5 10.6,12 12,11.2 13.4,12" fill="#E8001D"/>
  <!-- S needle (green) -->
  <polygon points="12,18.5 10.6,12 12,12.8 13.4,12" fill="#6B7A35"/>
  <!-- E/W ticks -->
  <line x1="19.5" y1="12" x2="18.2" y2="12" stroke="#0F2419" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="4.5" y1="12" x2="5.8" y2="12" stroke="#0F2419" stroke-width="1.2" stroke-linecap="round"/>
  <!-- center pin -->
  <circle cx="12" cy="12" r="1.3" fill="#0F2419"/>
  <!-- shine highlight -->
  <circle cx="12" cy="12" r="10.5" fill="url(#shineGrad)"/>
</svg>
